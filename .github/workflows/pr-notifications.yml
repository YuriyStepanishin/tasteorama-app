name: Pull Request Telegram Notifications

on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        run: |
          # Визначаємо статус пулреквесту
          if [ "${{ github.event.action }}" = "opened" ]; then
            STATUS="🚀 *Новий Пулреквест!*"
            TEXT="👤 Автор: [${{ github.event.pull_request.user.login }}](${{ github.event.pull_request.user.html_url }}) 
            📌 Назва: *${{ github.event.pull_request.title }}*"

          elif [ "${{ github.event.action }}" = "synchronize" ]; then
            STATUS="🔄 *Пулреквест оновлено (Нові коміти)!*"
            TEXT="👤 Автор змін: [${{ github.actor }}](https://github.com/${{ github.actor }})
            📌 Назва: *${{ github.event.pull_request.title }}*"

          elif [ "${{ github.event.action }}" = "closed" ]; then
            if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              STATUS="✅ *Пулреквест успішно злито (Merged)!*"
            else
              STATUS="❌ *Пулреквест закрито без злиття (Closed)*"
            fi
            TEXT="📌 Назва: *${{ github.event.pull_request.title }}*
            👤 Хто закрив: [${{ github.actor }}](https://github.com/${{ github.actor }})"
          fi

          # Формуємо фінальний текст повідомлення
          MESSAGE="$STATUS
          📂 Репозиторій: \`${{ github.repository }}\`
          $TEXT🔗 Посилання: [Переглянути PR](${{ github.event.pull_request.html_url }})"

          # Відправляємо запит в Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_SECRET_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
